name: Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-smoke:
    name: Boot smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [paper, folia]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build plugin jar
        run: ./gradlew jar --no-daemon
      - name: Download ${{ matrix.platform }} server (1.21.11)
        run: |
          set -euo pipefail
          MCV=1.21.11
          PROJECT="${{ matrix.platform }}"
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds" | jq -r '.builds[-1].build')
          FILE=$(curl -fsSL "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds/$BUILD" | jq -r '.downloads.application.name')
          curl -fsSL -o server.jar "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds/$BUILD/downloads/$FILE"
          echo "$PROJECT build $BUILD ($FILE)"
      - name: Prepare server
        run: |
          set -eu
          echo "eula=true" > eula.txt
          mkdir -p plugins
          cp build/libs/*.jar plugins/
      - name: Boot server, then stop
        run: |
          set -u
          java -Xmx2G -jar server.jar nogui > server.log 2>&1 &
          PID=$!
          for i in $(seq 1 180); do
            grep -q "Done (" server.log && break
            kill -0 "$PID" 2>/dev/null || { echo "Server exited early"; break; }
            sleep 1
          done
          sleep 5
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "===== server.log (tail) ====="
          tail -n 80 server.log
      - name: Assert plugin enabled with no errors
        run: |
          set -e
          grep -q "WildAnimalBalancer running." server.log || { echo "::error::Plugin did not enable on ${{ matrix.platform }}"; exit 1; }
          if grep -nE "Error occurred while enabling WildAnimalBalancer|accessing entity state off owning region|Could not load 'plugins" server.log; then
            echo "::error::Plugin error detected on ${{ matrix.platform }}"; exit 1
          fi
          echo "OK: enabled cleanly on ${{ matrix.platform }}"

  e2e:
    name: E2E spawn check (folia)
    runs-on: ubuntu-latest
    # The released Mineflayer package pins protocol deps that cap at 1.21.4, so the E2E
    # server runs there. The plugin's behaviour is identical across 1.21.x, and the real
    # 1.21.11 runtime (the version we play on) is covered by the boot-smoke jobs above.
    env:
      MCV: '1.21.4'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build plugin jar
        run: ./gradlew jar --no-daemon
      - name: Download Folia (${{ env.MCV }})
        run: |
          set -euo pipefail
          PROJECT=folia
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds" | jq -r '.builds[-1].build')
          FILE=$(curl -fsSL "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds/$BUILD" | jq -r '.downloads.application.name')
          curl -fsSL -o server.jar "https://api.papermc.io/v2/projects/$PROJECT/versions/$MCV/builds/$BUILD/downloads/$FILE"
          echo "folia build $BUILD ($FILE)"
      - name: Configure server
        run: |
          set -eu
          echo "eula=true" > eula.txt
          cp .github/e2e/server.properties server.properties
          mkdir -p plugins/WildAnimalBalancer
          cp build/libs/*.jar plugins/
          cp .github/e2e/config.yml plugins/WildAnimalBalancer/config.yml
      - name: Boot Folia
        run: |
          set -u
          java -Xmx2G -jar server.jar nogui > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 180); do
            grep -q "Done (" server.log && break
            kill -0 "$(cat server.pid)" 2>/dev/null || { echo "Server exited early"; tail -n 60 server.log; exit 1; }
            sleep 1
          done
          grep -q "WildAnimalBalancer running." server.log || { echo "Plugin did not enable"; tail -n 60 server.log; exit 1; }
          echo "Server is up and plugin enabled"
      - name: Run Mineflayer bot
        working-directory: .github/e2e
        env:
          MC_VERSION: ${{ env.MCV }}
        run: |
          npm install --no-audit --no-fund
          node bot.js
      - name: Stop server and show log
        if: always()
        run: |
          kill "$(cat server.pid)" 2>/dev/null || true
          sleep 3
          echo "===== server.log (tail) ====="
          tail -n 120 server.log
