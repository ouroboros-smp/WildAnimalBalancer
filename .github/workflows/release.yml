name: Release

# Push a tag like v1.0.0 to build and publish a release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew build
      - name: Publish to GitHub Release and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Your Modrinth project ID or slug. Not secret, safe to keep here.
          modrinth-id: YOUR_MODRINTH_PROJECT_ID
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # GITHUB_TOKEN is provided automatically. This also creates the GitHub Release.
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Grabs the built plugin jar, skipping any -sources / -javadoc / -dev jars.
          files: build/libs/!(*-@(dev|sources|javadoc)).jar

          # mc-publish derives the version and name from the pushed tag.
          version-type: release

          loaders: |
            paper
            folia
            purpur

          # List every Minecraft version you have actually tested against. Trim or extend.
          game-versions: |
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.11
